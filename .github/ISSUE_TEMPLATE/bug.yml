name: Bug Report
description: Report something that isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Install the theme
        2. Navigate to ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: theme-version
    attributes:
      label: Theme version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: starlight-version
    attributes:
      label: Starlight version
      placeholder: "0.30.0"
    validations:
      required: true

  - type: input
    id: astro-version
    attributes:
      label: Astro version
      placeholder: "5.3.0"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, error messages, or anything else that might help.
    validations:
      required: false
